<h1>{{ 'manageCalls.title' | translate }}</h1>

<mat-card class="picker-card">
  <mat-card-content>
    <mat-form-field>
      <mat-label>{{ 'manageCalls.selectFund' | translate }}</mat-label>
      <select matNativeControl (change)="onFundChange($any($event.target).value)">
        <option value="">{{ 'manageCalls.choose' | translate }}</option>
        @for (fund of fundsResource.value(); track fund.id) {
          <option [value]="fund.id">{{ fund.name }}</option>
        }
      </select>
    </mat-form-field>

    @if (selectedFundId()) {
      <mat-form-field>
        <mat-label>{{ 'manageCalls.selectInvestor' | translate }}</mat-label>
        <select matNativeControl (change)="onInvestorChange($any($event.target).value)">
          <option value="">{{ 'manageCalls.choose' | translate }}</option>
          @for (investor of investorsResource.value(); track investor.id) {
            <option [value]="investor.id">{{ investor.name }}</option>
          }
        </select>
      </mat-form-field>
    }
  </mat-card-content>
</mat-card>

@if (selectedInvestor(); as investor) {
  <app-call-form [investor]="investor" (created)="callList.reload()" />
  <div class="call-list-spacer">
    <app-call-list #callList [investorId]="investor.id" />
  </div>
} @else {
  <p>{{ 'manageCalls.pickInvestorHint' | translate }}</p>
}
